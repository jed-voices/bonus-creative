<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Goodwill poster">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05080d"/>
      <stop offset="54%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#121821"/>
    </linearGradient>
    <radialGradient id="keyLight" cx="28%" cy="18%" r="56%">
      <stop offset="0%" stop-color="#9EC8FF" stop-opacity=".42"/>
      <stop offset="48%" stop-color="#2A3F5F" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#0b0f14" stop-opacity="0"/>
