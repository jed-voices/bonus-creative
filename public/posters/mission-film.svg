    <radialGradient id="warmLight" cx="80%" cy="28%" r="38%">
      <stop offset="0%" stop-color="#D6A85A" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#D6A85A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frameGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#9EC8FF" stop-opacity=".08"/>
    </linearGradient>
    <clipPath id="mainFrameClip">
      <rect x="84" y="92" width="614" height="468" rx="28"/>
    </clipPath>
    <filter id="softNoise">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
  </defs>

