<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="VOICES of OKC mission stories poster">
  <defs>
    <linearGradient id="voicesShade" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0f14" stop-opacity=".06"/>
      <stop offset="45%" stop-color="#0b0f14" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#0b0f14" stop-opacity=".88"/>
    </linearGradient>
    <radialGradient id="blueLift" cx="18%" cy="12%" r="70%">
      <stop offset="0%" stop-color="#9EC8FF" stop-opacity=".34"/>
      <stop offset="52%" stop-color="#2A3F5F" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#0B0F14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmLift" cx="82%" cy="24%" r="46%">
      <stop offset="0%" stop-color="#D6A85A" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#D6A85A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footerFade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0B0F14" stop-opacity="0"/>
      <stop offset="58%" stop-color="#0B0F14" stop-opacity=".54"/>
      <stop offset="100%" stop-color="#0B0F14" stop-opacity=".92"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="#0B0F14"/>
  <image href="/images/goodwill-production-group.jpeg" x="0" y="-26" width="1200" height="800" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="750" fill="url(#voicesShade)"/>
  <rect width="1200" height="750" fill="url(#blueLift)"/>
  <rect width="1200" height="750" fill="url(#warmLift)"/>

  <g opacity=".72">
    <rect x="44" y="44" width="1112" height="662" rx="34" fill="none" stroke="#F5F7FA" stroke-opacity=".16"/>
    <path d="M84 92H310" stroke="#F5F7FA" stroke-opacity=".22" stroke-width="2"/>
    <path d="M890 660H1116" stroke="#9EC8FF" stroke-opacity=".34" stroke-width="2"/>
  </g>

  <rect x="0" y="420" width="1200" height="330" fill="url(#footerFade)"/>

  <g transform="translate(72 560)">
    <text fill="#9EC8FF" font-family="IBM Plex Mono, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="500" letter-spacing="5">MISSION STORIES / COMMUNITY ORGANIZATION</text>
    <text y="62" fill="#F5F7FA" font-family="Inter Tight, Sora, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5">VOICES of OKC</text>
    <text x="654" y="42" fill="#F5F7FA" fill-opacity=".84" font-family="Manrope, Avenir Next, Arial, sans-serif" font-size="24" font-weight="500">Grounded. Human. Useful.</text>
    <text x="654" y="78" fill="#B7C1CC" font-family="Manrope, Avenir Next, Arial, sans-serif" font-size="19">Honest stories for real communities.</text>
  </g>
</svg>
