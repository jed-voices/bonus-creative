<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Mission Stories poster">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05080d"/>
      <stop offset="50%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#121821"/>
    </linearGradient>
    <radialGradient id="blueBloom" cx="20%" cy="28%" r="52%">
      <stop offset="0%" stop-color="#9EC8FF" stop-opacity=".40"/>
      <stop offset="58%" stop-color="#2A3F5F" stop-opacity=".26"/>
      <stop offset="100%" stop-color="#0b0f14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldBloom" cx="80%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#D6A85A" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#D6A85A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1A2230" stop-opacity=".96"/>
      <stop offset="100%" stop-color="#0b0f14" stop-opacity=".92"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .07"/>
      </feComponentTransfer>
    </filter>
  </defs>

